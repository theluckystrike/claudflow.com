<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClaudFlow — AI Workflow Builder | Visual Prompt Chains</title>
  <meta name="description" content="Build visual AI workflows by chaining prompts into flowcharts. Drag, connect, and export prompt pipelines. Free, no sign-up, runs in your browser.">
  <meta property="og:title" content="ClaudFlow — AI Workflow Builder">
  <meta property="og:description" content="Visual flowchart builder for chaining AI prompts into automated workflows.">
  <meta property="og:url" content="https://claudflow.com/">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://claudflow.com/">
  <link rel="stylesheet" href="assets/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "ClaudFlow Workflow Builder",
    "url": "https://claudflow.com",
    "description": "Visual flowchart builder for chaining AI prompts into automated workflows with drag-and-drop blocks.",
    "applicationCategory": "Productivity",
    "operatingSystem": "Web",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
</head>
<body>
  <nav>
    <a href="/" class="brand">ClaudFlow</a>
    <ul class="nav-links">
      <li><a href="/blog/">Blog</a></li>
      <li><a href="/about.html">About</a></li>
    </ul>
  </nav>

  <section class="hero">
    <h1>AI Workflow Builder</h1>
    <p>Chain AI prompts into visual flowcharts. Drag, connect, export.</p>
  </section>

  <div class="canvas-toolbar">
    <div class="toolbar-group">
      <label>Add:</label>
      <button class="btn" data-add-type="input">Input</button>
      <button class="btn" data-add-type="prompt">AI Prompt</button>
      <button class="btn" data-add-type="condition">Condition</button>
      <button class="btn" data-add-type="transform">Transform</button>
      <button class="btn" data-add-type="output">Output</button>
    </div>
    <div class="toolbar-group">
      <label>Examples:</label>
      <button class="btn" data-example="blog">Blog Pipeline</button>
      <button class="btn" data-example="review">Code Review</button>
      <button class="btn" data-example="data">Data Analysis</button>
    </div>
    <div class="toolbar-group" style="margin-left:auto;">
      <button class="btn" id="btn-export">Export JSON</button>
      <button class="btn" id="btn-import">Import</button>
      <button class="btn" id="btn-clear">Clear</button>
    </div>
  </div>

  <div class="canvas-wrapper">
    <div class="canvas-area" id="canvas-area">
      <svg id="canvas-svg"></svg>
    </div>
    <p style="color:var(--text-muted);font-size:0.8rem;margin-top:0.5rem;">Click to add blocks. Drag to move. Drag from bottom port to top port to connect. Double-click to edit.</p>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3>Edit Block</h3>
      <input type="text" id="edit-label" placeholder="Block label">
      <textarea id="edit-content" placeholder="Block content (prompt text, condition logic, etc.)"></textarea>
      <div class="modal-actions">
        <button class="btn" id="modal-cancel">Cancel</button>
        <button class="btn btn-accent" id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <footer>
    Built by <a href="https://zovo.one">zovo.one</a> &middot; More tools: <a href="https://claudhq.com">ClaudHQ</a>, <a href="https://claudkit.com">ClaudKit</a>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
